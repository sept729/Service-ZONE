<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }
        #qrcode img {
            border: 5px solid white;
            border-radius: 10px;
        }
        .qr-label {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: sans-serif;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="circle" style="width: 80px; height: 80px; left: 10%; animation-duration: 8s;"></div>
        <div class="circle" style="width: 40px; height: 40px; left: 70%; animation-duration: 12s;"></div>
        <div class="circle" style="width: 100px; height: 100px; left: 40%; animation-duration: 15s;"></div>

        <div class="links-wrapper">

                <i class="fas fa-external-link-alt arrow-icon"></i>
            </a>

            <a href="https://instagram.com/service_zone152" class="link-item instagram animate__animated animate__fadeInLeft animate__delay-1s">
                <i class="fab fa-instagram"></i>
                <span>Follow on Instagram</span>
                <i class="fas fa-external-link-alt arrow-icon"></i>
            </a>

            <a href="https://www.tiktok.com/@service.zone74" class="link-item tiktok animate__animated animate__fadeInRight animate__delay-1s">
                <i class="fab fa-tiktok"></i>
